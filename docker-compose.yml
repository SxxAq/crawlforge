services:
  redis:
    image: redis:7-alpine
    container_name: crawlforge-redis
    network_mode: host
    command: redis-server --save 60 1

  api:
    build:
      context: .
      network: host
    container_name: crawlforge-api
    network_mode: host
    command: uv run uvicorn crawlforge.api.search_api:app --host 0.0.0.0 --port 8000
    environment:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  crawler:
    build:
      context: .
      network: host
    container_name: crawlforge-crawler
    network_mode: host
    command: uv run python -m crawlforge.main
    environment:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  embedder:
    build:
      context: .
      network: host
    container_name: crawlforge-embedder
    network_mode: host
    command: uv run python -m crawlforge.ml.embedding_worker
    environment:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
